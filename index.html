<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentient Technology — The Heart of AI</title>
  <meta name="description" content="Sentient Technology — building an ethical foundation for artificial intelligence.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --crimson: #b01a1a;
      --crimson-deep: #7a0e0e;
      --crimson-light: #c92929;
      --cream: #f5ead8;
      --gold: #d4a843;
      --spectrum-red: #e8392b;
      --spectrum-orange: #f47c20;
      --spectrum-yellow: #f5c518;
      --spectrum-green: #2e9e4f;
      --spectrum-blue: #2166b0;
      --spectrum-violet: #6b3fa0;
    }

    html, body {
      min-height: 100%;
      background: var(--crimson-deep);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    /* Radial glow from center */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 38%, rgba(180,30,30,0.55) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 4rem;
      gap: 0;
    }

    /* Logo */
    .logo-wrap {
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .logo-wrap img {
      width: min(320px, 72vw);
      height: auto;
      display: block;
      filter: drop-shadow(0 8px 40px rgba(0,0,0,0.45));
    }

    /* Divider */
    .divider {
      margin: 2.4rem auto 2rem;
      width: min(260px, 60vw);
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        var(--spectrum-red),
        var(--spectrum-orange),
        var(--spectrum-yellow),
        var(--spectrum-green),
        var(--spectrum-blue),
        var(--spectrum-violet),
        transparent
      );
      opacity: 0;
      animation: rise 0.9s ease 0.85s forwards;
    }

    /* Tagline */
    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      color: var(--cream);
      letter-spacing: 0.04em;
      text-align: center;
      max-width: 560px;
      line-height: 1.5;
      opacity: 0;
      animation: rise 0.9s ease 1.05s forwards;
    }

    .tagline em {
      font-style: normal;
      color: var(--gold);
    }

    /* Coming soon label */
    .attribution {
      margin-top: 1rem;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.8vw, 0.72rem);
      letter-spacing: 0.2em;
      color: var(--gold);
      opacity: 0;
      animation: rise 0.9s ease 1.2s forwards;
    }

    .soon-label {
      margin-top: 2.8rem;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.62rem, 2vw, 0.75rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(245,234,216,0.45);
      opacity: 0;
      animation: rise 0.9s ease 1.3s forwards;
    }

    /* Email form */
    .form-wrap {
      margin-top: 1.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      max-width: 400px;
      opacity: 0;
      animation: rise 0.9s ease 1.5s forwards;
    }

    .form-row {
      display: flex;
      width: 100%;
      border: 1px solid rgba(245,234,216,0.25);
      border-radius: 2px;
      overflow: hidden;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(4px);
      transition: border-color 0.3s;
    }

    .form-row:focus-within {
      border-color: var(--gold);
    }

    .form-row input[type="email"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.85rem 1rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      color: var(--cream);
      letter-spacing: 0.03em;
    }

    .form-row input[type="email"]::placeholder {
      color: rgba(245,234,216,0.35);
    }

    .form-row button {
      background: var(--gold);
      border: none;
      padding: 0.85rem 1.2rem;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--crimson-deep);
      cursor: pointer;
      transition: background 0.25s;
      white-space: nowrap;
    }

    .form-row button:hover {
      background: var(--cream);
    }

    .form-note {
      font-size: 0.78rem;
      color: rgba(245,234,216,0.35);
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* Success state */
    .success-msg {
      display: none;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--gold);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,234,216,0.22);
      white-space: nowrap;
      opacity: 0;
      animation: rise 1s ease 2s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Spectrum pulse on logo hover */
    .logo-wrap:hover img {
      filter: drop-shadow(0 8px 50px rgba(212,168,67,0.4)) drop-shadow(0 0 20px rgba(180,30,30,0.6));
      transition: filter 0.4s ease;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="logo-wrap">
      <img src="IMG_1439.webp" alt="Sentient Technology — The Heart of AI">
    </div>

    <div class="divider"></div>

    <p class="tagline">
      "Who controls the past controls the future.<br>Who controls the present controls the past."
    </p>
    <p class="attribution">— George Orwell, 1984</p>

    <p class="soon-label">Something is coming</p>

    <div class="form-wrap">
      <div class="form-row">
        <input type="email" id="email-input" placeholder="your@email.com" autocomplete="email">
        <button onclick="handleSubmit()">Notify Me</button>
      </div>
      <p class="form-note">Be first to know when we launch.</p>
      <p class="success-msg" id="success-msg">You're on the list. Thank you.</p>
    </div>
  </main>

  <footer class="footer">© 2026 Sentient Technology LLC — Northampton, MA</footer>

  <script>
    function handleSubmit() {
      const input = document.getElementById('email-input');
      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        input.style.color = '#e8392b';
        setTimeout(() => input.style.color = '', 600);
        return;
      }
      // Replace this with your actual form endpoint (Formspree, Netlify Forms, etc.)
      const formRow = input.closest('.form-row');
      const note = formRow.nextElementSibling;
      const success = document.getElementById('success-msg');
      formRow.style.opacity = '0';
      formRow.style.transition = 'opacity 0.4s';
      note.style.opacity = '0';
      note.style.transition = 'opacity 0.4s';
      setTimeout(() => {
        formRow.style.display = 'none';
        note.style.display = 'none';
        success.style.display = 'block';
      }, 400);
    }

    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
